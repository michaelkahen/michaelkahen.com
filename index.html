<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#000000">
    <title>root@biosphere</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main
      class="terminal"
      aria-label="Autonomous ASCII jungle and lake ecosystem"
    >
      <header class="topbar">
        <h1>
          <span class="shell-user">root@biosphere</span>:~$ ./ecosystem
          --watch<span class="cursor" aria-hidden="true"></span>
        </h1>
        <div class="live-mark" id="live-mark">[ RUNNING ]</div>
      </header>

      <div class="layout">
        <section class="world-wrap" aria-label="Ecosystem viewport">
          <canvas
            id="world"
            tabindex="0"
            aria-label="Animated ecosystem. Deer, snakes, and a tiger inhabit a structured jungle; fish and an alligator inhabit one generated lake; decorative birds fly overhead without interacting with the habitat."
          ></canvas>
          <div class="paused" id="paused-overlay" hidden>
            [ PROCESS SUSPENDED ]
          </div>
        </section>
      </div>

      <footer class="bottombar">
        <nav class="instructions" aria-label="Simulation instructions">
          <button
            type="button"
            id="pause-button"
            aria-pressed="false"
            aria-keyshortcuts="Space"
          >
            SPACE : PAUSE
          </button>
          <button
            type="button"
            id="speed-button"
            aria-label="Change simulation speed"
            aria-keyshortcuts="S"
          >
            S : 1×
          </button>
          <button type="button" id="reset-button" aria-keyshortcuts="R">
            R : RESET
          </button>
        </nav>
        <div
          class="footer-status"
          role="group"
          aria-label="Simulation telemetry"
        >
          <span>TIME=<strong id="stat-time">00:00</strong></span>
          <span>GEN=<strong id="stat-generation">000</strong></span>
          <span>POP=<strong id="stat-population">000</strong></span>
          <span>FPS=<strong id="stat-fps">60</strong></span>
        </div>
      </footer>
    </main>

    <script src="ecosystem.js"></script>
  </body>
</html>
