<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" role="img" aria-labelledby="cr-title cr-desc">
  <title id="cr-title">Industrial contact radar</title>
  <desc id="cr-desc">A prominent directional dish on a mechanical pedestal with signal arcs, a cable, and an illuminated control console.</desc>
  <defs>
    <linearGradient id="cr-steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#afa591"/>
      <stop offset="0.42" stop-color="#77766b"/>
      <stop offset="1" stop-color="#414845"/>
    </linearGradient>
    <linearGradient id="cr-dish" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b4aa95"/>
      <stop offset="0.48" stop-color="#77776d"/>
      <stop offset="1" stop-color="#3c4542"/>
    </linearGradient>
    <linearGradient id="cr-copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e29444"/>
      <stop offset="0.5" stop-color="#ad6336"/>
      <stop offset="1" stop-color="#6c392b"/>
    </linearGradient>
    <radialGradient id="cr-lamp">
      <stop offset="0" stop-color="#e0f59a"/>
      <stop offset="0.45" stop-color="#79b85f"/>
      <stop offset="1" stop-color="#315e3d"/>
    </radialGradient>
