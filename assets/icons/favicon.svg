  <circle cx="32" cy="32" r="17.5" fill="#202727" stroke="#171c1c" stroke-width="2"/>
  <path d="M17.5 44V20l14.5 16L46.5 20v24" fill="none" stroke="url(#fav-copper)" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter"/>
  <path d="M19 17q13-9 26 0" fill="none" stroke="#c5bba5" stroke-width="2" stroke-linecap="round" opacity="0.55"/>
  <circle cx="48" cy="47" r="5" fill="#171c1c"/>
