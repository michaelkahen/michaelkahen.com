<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="fav-title fav-desc">
  <title id="fav-title">Factory gear M mark</title>
  <desc id="fav-desc">An original compact graphite gear surrounding a copper letter M with a green machine status light.</desc>
  <defs>
    <linearGradient id="fav-steel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9e9685"/>
      <stop offset="0.48" stop-color="#626863"/>
      <stop offset="1" stop-color="#303735"/>
    </linearGradient>
    <linearGradient id="fav-copper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a04a"/>
      <stop offset="0.5" stop-color="#d17138"/>
      <stop offset="1" stop-color="#8c462d"/>
    </linearGradient>
    <radialGradient id="fav-lamp">
      <stop offset="0" stop-color="#dcf490"/>
      <stop offset="0.5" stop-color="#76b65c"/>
      <stop offset="1" stop-color="#315e3c"/>
    </radialGradient>
    <rect id="fav-tooth" x="27" y="1.5" width="10" height="13" rx="2.5"/>
