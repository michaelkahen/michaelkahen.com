    <use href="#fav-tooth" transform="rotate(135 32 32)"/>
    <use href="#fav-tooth" transform="rotate(180 32 32)"/>
    <use href="#fav-tooth" transform="rotate(225 32 32)"/>
    <use href="#fav-tooth" transform="rotate(270 32 32)"/>
    <use href="#fav-tooth" transform="rotate(315 32 32)"/>
    <circle cx="32" cy="32" r="23"/>
